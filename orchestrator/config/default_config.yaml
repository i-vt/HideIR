global:
  enabled: true
  # Leave empty to auto-detect relative to the wrapper binary (build/plugins/).
  # Set an absolute path to override.
  plugin_dir: ""
  strip_symbols: true

passes:
  split_basic_block:
    enabled: true
    threshold: 3       # Minimum instructions in a block before splitting
  flattening:
    enabled: true
    probability: 1.0   # Fraction of functions to flatten (0.0 - 1.0)
  opaque_predicate:
    enabled: true
    probability: 0.8   # Fraction of blocks to insert opaque predicates (0.0 - 1.0)
  string_encryption:
    enabled: true
  function_outlining:
    enabled: true
  anti_debugging:
    enabled: true
  api_hiding:
    enabled: true
  anti_tampering:
    enabled: true
